    verification:
    - case:
        input:
          value: '`file.py`'
        expect: file.py
    - case:
        input:
          value: file.py
        expect: file.py
    - case:
        input:
          value: '`file.py::function`'
        expect: file.py::function
    - case:
        input:
          value: file.py::function
        expect: file.py::function
    decisions:
    - 先建立獨立 helper 避免與 adad_core 的 Source Lock 衝突；完成度不包含接線；新檔唯一節點採整檔 Source 以相容現有
      Invariants Gate
    todo:
    - '[ ] #57-A：建立 helper；後續 Task 再接入 parse_markdown'
    checkpoint:
    - '[x] CP-1-057-A (validated：2026-07-14 人工核准核發)'
    observability:
      mode: not_required
      signals: []
    complexity: low
    algorithm:
    - 值由一對單反引號完整包覆時只移除最外層該一對。
    - 無反引號時保持原值。
    - 未成對或多重反引號保持原值，本 Task 不推測其語意。
    - 本 Task 不修改 parse_markdown、Source binding 或 verification 行為。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 2
    required_context: []
    forbidden_context: []
    context_priority: {}
    state: validated
    fan_in_snapshot: 0
    known_symbols:
