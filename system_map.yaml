version: 1
modules:
  sync_adad_assets:
    type: tool
    description: 以 adad_source 作為唯一可編輯來源，同步產生本 repo 的 .agents 與發佈給 adad init 的 resources
      資產；Python 快取不是受管理資產，必須排除於複製與一致性比較之外。
    source: adad_cli/sync_assets.py
    domain: ADAD_Workflow
    subsystem: Core_Engine
    map_file: system_map.md
    dependencies: []
    input:
      source_file: adad_cli/sync_assets.py
      test_file: tests/test_sync_assets.py
      allowed_symbols: '[_tree_files, _compare_tree, _copy_tree, sync_assets]'
      forbidden_files: '[system_map.md, adad_source, adad_cli/resources, .agents/AGENTS.md,
        README.md]'
    output:
      result: object（同步或檢查結果；不一致時列出相對路徑）
    invariants:
    - 'deny_imports: [yaml]'
    preferred_pattern: pure_function
    verification:
    - must_have_assertions
    decisions: []
    todo:
    - '[ ] 規格總覽 #50：排除並清理 Python 快取，避免同步一致性假失敗'
    checkpoint:
    - '[x] CP-1-018 (validated)'
    - '[x] CP-3-002 (validated：生成資產快取排除)'
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 收集與比較檔案樹時，排除路徑任一層為 __pycache__ 的檔案及副檔名為 .pyc 的檔案。
    - --write 前先從受管理輸出樹移除上述快取，再只複製 canonical 的非快取檔案。
    - --check 只比較受管理檔案，Python 執行期產生的快取不得造成不一致。
    - 擴充測試，驗證 canonical 與輸出任一側出現 .pyc 時，資產檢查仍只評估受管理檔案且 --write 可清理輸出快取。
    state: deployed
    fan_in_snapshot: 2
    known_symbols:
    - _compare_file
    - _compare_tree
    - _copy_file
    - _copy_tree
    - _tree_files
    - main
    - managed_assets
    - sync_assets
  read_context:
    type: tool
    description: 讀取單一節點最小上下文的輔助工具
    source: adad_source/agents/skills/adad-workflow/scripts/read_context.py
    domain: ADAD_Workflow
    subsystem: Core_Engine
    map_file: system_map.md
    dependencies: []
    input:
      node_name: string
    output:
      context: object
    invariants: []
    preferred_pattern: none
    verification: []
    decisions: []
    todo:
    - '[ ] 補齊與其他 UI 工具串接的 context 回傳欄位'
    checkpoint:
    - '[x] CP-1-001 (validated)'
    - '[x] CP-2-001 (deployed)'
    observability:
      mode: not_required
      signals: []
    complexity: low
    algorithm: []
    state: planned
    fan_in_snapshot: 1
    known_symbols:
    - main
  check_normalization:
    type: tool
    description: 執行 Rule of Two 邊界檢查；支援舊 positional JSON、UTF-8 JSON 檔案與 stdin，避免 Windows
      shell quoting 破壞 JSON。
    source: adad_source/agents/skills/adad-workflow/scripts/check_normalization.py::main
    domain: ADAD_Workflow
    subsystem: Core_Engine
    map_file: system_map.md
    dependencies: []
    input:
      target_file: adad_source/agents/skills/adad-workflow/scripts/check_normalization.py
      allowed_symbols: '[main]'
      forbidden_files: '[system_map.md, adad_cli/core.py, adad_cli/sync_assets.py,
        adad_cli/resources, .agents, README.md]'
      proposal_json: string（向後相容的 positional JSON，可選）
      stdin: string（未提供 positional 與 --file 時使用）
    output:
      result: object
    invariants:
    - 'deny_imports: [pymysql]'
    preferred_pattern: pure_function
    verification:
    - must_have_assertions
    decisions: []
    todo:
    - '[ ] 支持更加複雜的模糊關鍵字權重分析比對'
    checkpoint:
    - '[x] CP-1-002 (validated)'
    - '[x] CP-2-002 (deployed)'
    - '[x] CP-3-001 (validated：改善 Windows quoting 輸入邊界)'
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 使用 argparse 定義可選 positional `proposal_json` 與 `--file <path>`；兩者同時提供時輸出結構化錯誤並
      exit 1。
    - 若提供 `--file`，以 UTF-8 讀取完整內容；否則若有 positional 則沿用舊行為；兩者皆無時從 stdin 讀取，stdin 為互動終端或內容空白時輸出用法錯誤。
    - 將取得的文字交給 json.loads；解析失敗、檔案讀取失敗或根節點不是 object 時，都輸出單一 JSON error object 並 exit
      1，不輸出 traceback。
    - 保留 name 必填與既有 ADADCore.evaluate_normalization 呼叫，不改 Rule of Two 判斷邏輯及成功輸出格式。
    - 僅修改 canonical source 的 main；生成副本由 sync_adad_assets 更新，不直接手改。
    state: validated
    fan_in_snapshot: 0
  analyze_cascade:
