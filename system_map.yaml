  resolve_verification_fixture_inputs:
    type: function
    description: '解析 Verification case 宣告的 UTF-8 JSON fixture 來源，將資料安全注入 case input；路徑必須限制在專案根目錄內，且不得靜默覆寫原始
      input，作為 #37 Fixture / Mock Data 來源宣告的原子基礎能力。'
    source: adad_cli/workflow/verification_fixtures.py::resolve_verification_fixture_inputs
    domain: ADAD_Roadmap
    subsystem: Contract_Evolution
    map_file: docs\domains\adad_roadmap.md
    dependencies: []
    input:
      case: object
      project_root: string
    output:
      resolved_case: object
    exceptions: []
    invariants:
    - 'deny_calls: [eval, exec, os.chdir, pickle.load, yaml.load]'
    preferred_pattern: boundary_adapter
    verification:
    - case:
        input:
          case:
            input:
              value: 1
            expect: 1
          project_root: .
        expect:
          input:
            value: 1
          expect: 1
    - case:
        input:
          case:
            input: {}
            fixtures:
            - input_key: payload
              source: C:\outside.json
          project_root: .
        expect_exception: ValueError
    - case:
        input:
          case:
            input: {}
            fixtures:
            - input_key: payload
              source: /outside.json
          project_root: .
        expect_exception: ValueError
    - case:
        input:
          case:
            input: {}
            fixtures:
            - input_key: payload
              source: ../outside.json
          project_root: .
        expect_exception: ValueError
    - case:
        input:
          case:
            input:
              payload: {}
            fixtures:
            - input_key: payload
              source: tests/fixture.json
          project_root: .
        expect_exception: ValueError
    decisions: []
    todo:
    - '[ ] #37 第一原子步驟：解析並安全注入 JSON fixture input'
    checkpoint:
    - '[ ] CP-1-046 (planned)'
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 驗證 case 是 object、case.input 是 object，且 fixtures 缺省時視為空陣列；fixtures 存在時必須是 descriptor
      array。
    - 逐筆驗證 descriptor 僅具非空 `input_key` 與 `source`；以 host Path、PurePosixPath 與 PureWindowsPath
      的語意拒絕所有平台的絕對路徑，並拒絕重複 input_key 及既有 input key 衝突。
    - 將 source 相對 project_root 解析並正規化，確認結果仍位於 project_root 且是存在的 regular file。
    - 以嚴格 UTF-8 讀取並解析 JSON，把解析值注入新 input，最後回傳保留原 case 其他欄位的新 case。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    state: validated
    fan_in_snapshot: 0
