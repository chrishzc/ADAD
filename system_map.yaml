      allowed_symbols: '[evaluate_task_complexity]'
      forbidden_files: '[adad_cli/core.py, adad_cli/sync_assets.py, system_map.md,
        README.md]'
      test_file: tests/test_task_complexity.py
      complexity: string
      has_algorithm: boolean
      has_boundaries: boolean
      has_verification: boolean
      model_capability: string
      override_approved: boolean
      override_reason: string
    output:
      decision: string
    exceptions: []
    invariants:
    - 'deny_imports: [yaml, subprocess, os]'
    preferred_pattern: pure_function
    verification:
    - case:
        input:
          complexity: low
          has_algorithm: false
          has_boundaries: false
          has_verification: false
          model_capability: low
          override_approved: false
          override_reason: ''
        expect: issue
    - case:
        input:
          complexity: medium
          has_algorithm: true
          has_boundaries: true
          has_verification: true
          model_capability: standard
          override_approved: false
          override_reason: ''
        expect: issue
    - case:
        input:
          complexity: medium
          has_algorithm: true
          has_boundaries: true
          has_verification: false
          model_capability: standard
          override_approved: false
          override_reason: ''
        expect: complete_spec
    - case:
        input:
          complexity: high
          has_algorithm: true
          has_boundaries: true
          has_verification: true
          model_capability: high
          override_approved: false
          override_reason: ''
        expect: split
    - case:
        input:
          complexity: high
          has_algorithm: true
          has_boundaries: true
          has_verification: true
          model_capability: high
          override_approved: true
          override_reason: atomic external transaction
        expect: issue_override
    - case:
        input:
          complexity: high
          has_algorithm: true
          has_boundaries: true
          has_verification: true
          model_capability: standard
          override_approved: true
          override_reason: atomic external transaction
        expect: split
    decisions: []
    todo:
    - '[x] 規格總覽 #49 第一階段：純函式複雜度決策矩陣與直接 pytest'
