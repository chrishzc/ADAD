    - build_source_to_module_map
    - check_atomic_scope
    - check_dangling_dependencies
    - check_domain_boundary_staged
    - check_invariants_staged
    - check_module_placement
    - check_staleness
    - check_state_gate
    - check_task_gate_staged
    - check_unregistered_functions
    - check_verification_staged
