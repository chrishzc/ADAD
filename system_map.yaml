      post_audit_report: object
    exceptions: []
    invariants:
    - 'deny_imports: [adad_core]'
    - 'deny_calls: [os.remove, os.unlink, shutil.rmtree]'
    preferred_pattern: service
    verification:
    - command:
        argv:
        - '{project_python}'
        - -m
        - pytest
        - tests/test_source_lock_pruner.py
        - tests/test_source_lock_audit_service.py
        - tests/test_source_lock_repository.py
        - -q
        - --basetemp
        - '{workspace}/pytest-source-lock-pruner-workspace'
        cwd: project
        expect_exit: 0
    decisions:
    - A3 依賴 A1 repository 與 A2 audit 的已核准行為；為避免重現 A1 cleanup race，quarantine 是終態保留物而非可自動刪除的暫存檔；採整批
      preflight 防止 time-of-check/time-of-use 部分清理
    todo:
    - '[ ] #80-A3：抽離 stale／orphan Source Lock prune service'
    checkpoint:
    - '[x] CP-1-080-A3-SOURCE-LOCK-PRUNER (validated：2026-07-17 人工核准；quarantine 必須保留)'
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 以已核准 SourceLockAuditService 與 SourceLockRepository 建構；先 audit，任何 mutation_blocked
      或 healthy=false 時零 mutation。
    - 只從 audit 的 stale／orphan records 建立候選；在任何 mutation 前，逐筆重新掃描、重新分類、比對 canonical
      path、payload digest、lstat identity 與 Task identity。
    - 任一候選重新驗證不確定、漂移、變為 active／invalid，或 preflight 未全部通過時，整批零 mutation。
    - 只對通過 preflight 的 exact canonical lock 呼叫 repository.quarantine；quarantine 為終態保留證據，不得
      remove、unlink 或刪除 quarantine。
    - quarantine 後執行 fresh audit；僅在 canonical lock 缺失、沒有衝突且 audit 可確定時，依既有安全 restore
      規則處理；遇 uncertainty 或衝突即停止後續 recovery 並保留 quarantine。
    - 回傳 receipt、每筆 mutation evidence 與事後 audit；重複執行必須 idempotent，且本節點不得實作 reconcile、修改
      Task lifecycle 或接線 core／CLI。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 2
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    state: validated
    fan_in_snapshot: 0
    known_symbols:
