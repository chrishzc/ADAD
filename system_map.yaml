    - 'deny_imports: [yaml, subprocess, os]'
    preferred_pattern: pure_function
    verification:
    - case:
        input:
          verification_case:
            expect:
              CI: null
            expect_absent_keys:
            - GITHUB_BASE_REF
        expect:
          expect:
            CI: null
          expect_absent_keys:
          - GITHUB_BASE_REF
    - case:
        input:
          verification_case:
            expect:
              CI: null
            expect_absent_keys:
            - CI
        expect_exception: ValueError
    - case:
        input:
          verification_case:
            expect_absent_keys:
            - ''
        expect_exception: ValueError
    - case:
        input:
          verification_case:
            expect_absent_keys:
            - CI
            - CI
        expect_exception: ValueError
    decisions: []
    todo:
    - '[ ] #67：建立鍵不存在的明確 Verification 契約'
    checkpoint:
    - '[x] CP-1-067-ABSENCE (validated：2026-07-15 人工核准核發)'
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 複製輸入 case；未宣告 expect_absent_keys 時維持既有 Verification 語意。
    - expect_absent_keys 必須是由非空字串組成且不得重複的陣列。
    - 若同一路徑同時出現在 expect 與 expect_absent_keys，立即拒絕，因 null 是值而不是不存在。
    - 回傳正規化的新 case，不修改輸入、不執行 Verification。
    idempotency:
