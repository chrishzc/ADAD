version: 14
modules:
  sync_adad_assets:
    type: tool
    description: 以 adad_source 作為唯一可編輯來源，同步產生本 repo 的 .agents 與發佈給 adad init 的 resources
      資產；Python 快取不是受管理資產，必須排除於複製與一致性比較之外。
    source: adad_cli/sync_assets.py
    domain: ADAD_Workflow
    subsystem: Core_Engine
    map_file: system_map.md
    dependencies: []
    input:
      source_file: adad_cli/sync_assets.py
      test_file: tests/test_sync_assets.py
      allowed_symbols: '[_tree_files, _compare_tree, _copy_tree, sync_assets]'
      forbidden_files: '[system_map.md, adad_source, adad_cli/resources, .agents/AGENTS.md,
        README.md]'
    output:
      result: object（同步或檢查結果；不一致時列出相對路徑）
    exceptions: []
    invariants:
    - 'deny_imports: [yaml]'
    preferred_pattern: pure_function
    verification:
    - must_have_assertions
    decisions: []
    todo:
    - '[ ] 規格總覽 #50：排除並清理 Python 快取，避免同步一致性假失敗'
    checkpoint:
    - '[x] CP-1-018 (validated)'
    - '[x] CP-3-002 (validated：生成資產快取排除)'
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 收集與比較檔案樹時，排除路徑任一層為 __pycache__ 的檔案及副檔名為 .pyc 的檔案。
    - --write 前先從受管理輸出樹移除上述快取，再只複製 canonical 的非快取檔案。
    - --check 只比較受管理檔案，Python 執行期產生的快取不得造成不一致。
    - 擴充測試，驗證 canonical 與輸出任一側出現 .pyc 時，資產檢查仍只評估受管理檔案且 --write 可清理輸出快取。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    state: deployed
    fan_in_snapshot: 2
    known_symbols:
    - _compare_file
    - _compare_tree
    - _copy_file
    - _copy_tree
    - _tree_files
    - main
    - managed_assets
    - sync_assets
  read_context:
    type: tool
    description: 讀取單一節點最小上下文的輔助工具
    source: adad_source/agents/skills/adad-workflow/scripts/read_context.py
    domain: ADAD_Workflow
    subsystem: Core_Engine
    map_file: system_map.md
    dependencies: []
    input:
