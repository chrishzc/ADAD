    type: service
    description: '#80-A3 將已核准 Source Lock prune 的候選判定、重新驗證、quarantine 與事後 audit 抽離為獨立
      service；只清理 stale／orphan lock，不接線 ADADCore facade、CLI 或 reconcile。'
    source: adad_source/agents/skills/adad-workflow/scripts/source_lock_pruner.py
    domain: ADAD_Workflow
    subsystem: Core_Engine
    map_file: system_map.md
    dependencies:
