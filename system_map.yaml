    - ADADCore.check_draft_debt
    - ADADCore.check_invariants
    - ADADCore.check_ir_validity
    - ADADCore.check_source_binding
    - ADADCore.check_task_gate
    - ADADCore.check_task_readiness
    - ADADCore.evaluate_normalization
    - ADADCore.generate_task
