    type: function
    description: 以純函式判定施工 Task 應直接核發、補齊規格或拆分；已接線 generate_task，high complexity 一律要求拆分，人工
      override 待後續契約實作（#49）。
    source: adad_source/agents/skills/adad-workflow/scripts/task_complexity.py::evaluate_task_complexity
