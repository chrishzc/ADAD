  adad_pre_commit:
    type: tool
    description: '#62 CI diff base 解析；GitHub push 的空 GITHUB_BASE_REF 必須回退 HEAD~1，PR
      則使用 origin/<base>。'
    source: adad_source/agents/skills/adad-workflow/scripts/adad_pre_commit.py
    domain: ADAD_Workflow
    subsystem: Enforcement_Gates
    map_file: system_map.md
    dependencies:
    - adad_core
    input:
      ci_environment: object
      github_base_ref: string|null
    output:
      diff_target: array
      staged_files: array
    exceptions: []
    invariants: []
    preferred_pattern: none
    verification:
    - command:
        argv:
        - '{project_python}'
        - -m
        - pytest
        - tests/test_adad_pre_commit.py
        - -q
        - --basetemp
        - '{workspace}/pytest'
        cwd: project
        expect_exit: 0
    decisions:
    - 空字串不得視為合法 ref；workflow 已使用 fetch-depth 0，允許 HEAD~1；本 Task 不修改 Verification 或
      Commit Gate
    todo:
    - '[ ] #62：修正 GitHub push 空 GITHUB_BASE_REF 產生 origin/'
    checkpoint:
    - '[x] CP-1-062-HOOK (validated：2026-07-15 人工核准 CI 修正)'
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 非 CI 環境維持 git diff --cached。
    - CI 中以 GITHUB_BASE_REF 的非空值作為 PR base；空值或缺值回退 HEAD~1。
    - 只有非 HEAD、非 origin/ 開頭的 base 才補 origin/ 前綴。
    - 測試覆蓋 GitHub push 空值、CI 缺值、PR base 與非 CI 四條路徑。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 2
    required_context: []
    forbidden_context: []
    context_priority: {}
    state: validated
    fan_in_snapshot: 2
