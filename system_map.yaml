    type: service
    description: '#82 封存不屬於目前 SSOT 的本機 Task snapshot 與 Source Lock 藝術品；此節點只處理明確指定的測試／遺留候選，保留可驗證證據，不重發、不刪除、不接線
      production core、CLI 或一般 Task lifecycle。'
