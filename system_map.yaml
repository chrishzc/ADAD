  verification_absence_contract:
    type: function
    description: '#67 以明確欄位表達 Verification 預期鍵不存在，禁止再以 null 猜測刪除語意。'
    source: adad_cli/workflow/verification_absence_contract.py::validate_verification_absence_contract
