        - pytest
        - tests/test_project_runtime_state_policy.py
        - tests/test_source_lock_audit_service.py
        - tests/test_source_lock_repository.py
        - -q
        - --basetemp
        - '{workspace}/pytest-runtime-state-policy'
        - -p
        - no:cacheprovider
        cwd: project
        expect_exit: 0
    decisions:
    - 非 SSOT 的測試遺留 Task 不得重發；Task snapshot archive 是獨立於 Source Lock repository 的 runtime-state
      邊界；lock 仍只能透過已核准 repository quarantine；archive 是保留證據，不是 cleanup；全批 preflight
      與 fresh audit 防止將測試遺留誤判為 active production claim；不為單一測試 artifact 建立全域 sweep
      或自動清理機制
    todo:
    - '[ ] #82：封存非 SSOT Task snapshot／Source Lock 測試遺留，保留 evidence'
    checkpoint:
    - '[x] CP-1-082-RUNTIME-STATE-ARCHIVE (validated：2026-07-18 人工要求新增並核發)'
    observability:
      mode: not_required
      signals: []
    complexity: high
    algorithm:
    - 只接受非空、無重複、無 traversal 的 candidate_node_names；候選 Task snapshot、canonical lock
      與 archive 目標均必須 canonicalize 後位於 project 的 task_dir／lock_dir 內，symlink、junction、非
      regular file、permission 或 I/O uncertainty 一律零 mutation。
    - 先取得 fresh SourceLockAuditService report；healthy=false 或 mutation_blocked=true
      時整批零 mutation。每個候選都必須可重讀，且其 node_name 與 source_path 在目前 SSOT 均不存在 owner；仍有 SSOT
      owner、active claim、有效可重發 Task 或不確定分類一律拒絕封存。
    - 每筆候選在 mutation 前重掃、重新分類並比對 Task snapshot 與 canonical lock 的 payload digest、lstat
      identity、node_name、source_path 與 task_id。Task／lock mismatch 可作為各自 foreign artifact
      封存的證據，但不得把不相符項目當作同一 artifact pair。
    - 所有候選 preflight 通過後才開始處理。canonical lock 只能經 SourceLockRepository.quarantine 封存；Task
      snapshot 只能經 TaskSnapshotArchiveRepository 的 non-overwrite、identity-checked
      archive 邊界封存。兩者都必須保留 exact bytes、來源 identity、payload digest、archive path 與 mutation
      evidence。
    - 任一 archive、identity drift、restore、permission 或 post-mutation audit 失敗時，停止後續候選；能安全恢復時依原始
      receipt 恢復，否則保留已封存證據並回 manual_action_required。不得覆寫現有 canonical lock、Task snapshot
      或 archive。
    - archive 後必須執行 fresh audit。重複執行對已封存或不存在的明確候選必須 idempotent；本節點不刪除 archive、不得重發
      Task、不得變更 system map、不得修改其他 Task lifecycle 狀態。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 2
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    state: dirty
    fan_in_snapshot: 0
