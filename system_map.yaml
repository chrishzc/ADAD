  task_complexity_policy:
    type: function
    description: 以純函式判定施工 Task 應直接核發、補齊規格或拆分；已接線 generate_task，high complexity 一律要求拆分，人工
      override 待後續契約實作（#49）。
    source: adad_source/agents/skills/adad-workflow/scripts/task_complexity.py::evaluate_task_complexity
    domain: ADAD_Roadmap
    subsystem: Contract_Evolution
    map_file: docs\domains\adad_roadmap.md
    dependencies: []
    input:
      target_file: adad_source/agents/skills/adad-workflow/scripts/task_complexity.py
      legacy_file: adad_cli/task_complexity.py
      allowed_symbols: '[evaluate_task_complexity]'
      forbidden_files: '[adad_cli/core.py, adad_cli/sync_assets.py, system_map.md,
        tests, README.md]'
      complexity: string
      has_algorithm: boolean
      has_boundaries: boolean
      has_verification: boolean
      model_capability: string
      override_approved: boolean
      override_reason: string
    output:
      decision: string
    exceptions: []
    invariants:
    - 'deny_imports: [yaml, subprocess, os]'
    preferred_pattern: pure_function
    verification:
    - case:
        input:
          complexity: low
          has_algorithm: false
          has_boundaries: false
          has_verification: false
          model_capability: low
          override_approved: false
          override_reason: ''
        expect: issue
    - case:
        input:
          complexity: medium
          has_algorithm: true
          has_boundaries: true
          has_verification: true
          model_capability: standard
          override_approved: false
          override_reason: ''
        expect: issue
    - case:
        input:
          complexity: medium
          has_algorithm: true
          has_boundaries: true
          has_verification: false
          model_capability: standard
          override_approved: false
          override_reason: ''
        expect: complete_spec
    - case:
        input:
          complexity: high
          has_algorithm: true
          has_boundaries: true
          has_verification: true
          model_capability: high
          override_approved: false
          override_reason: ''
        expect: split
    - case:
        input:
          complexity: high
          has_algorithm: true
          has_boundaries: true
          has_verification: true
          model_capability: high
          override_approved: true
          override_reason: atomic external transaction
        expect: issue_override
    - case:
        input:
          complexity: high
          has_algorithm: true
          has_boundaries: true
          has_verification: true
          model_capability: standard
          override_approved: true
          override_reason: atomic external transaction
        expect: split
    decisions: []
    todo:
    - '[ ] 規格總覽 #49 第一階段：實作純函式複雜度決策矩陣'
    checkpoint:
    - '[x] CP-1-037 (validated)'
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 將 complexity 與 model_capability 正規化為小寫，僅接受 complexity=[low, medium, high] 與
      model_capability=[low, standard, high]；非法值拋出 ValueError。
    - complexity=low 時回傳 `issue`。
    - complexity=medium 時，只有 has_algorithm、has_boundaries、has_verification 全為 true
      才回傳 `issue`，否則回傳 `complete_spec`。
    - complexity=high 時，只有 model_capability=high、override_approved=true 且 override_reason
      去除空白後非空，才回傳 `issue_override`。
    - 其餘 high 情況一律回傳 `split`；不得讀寫檔案、環境變數、全域狀態或呼叫外部服務。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    state: deployed
    fan_in_snapshot: 1
