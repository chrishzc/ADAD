  source_lock_repository:
    type: service
    description: '#80-A1 將已驗證的 Source Lock artifact 路徑、strict identity、讀取、exclusive
      create、force-reissue replace、exact release 與 quarantine／cleanup 原樣抽離為獨立 repository；本節點不判讀
      Task 狀態或 lock 分類。'
    source: adad_source/agents/skills/adad-workflow/scripts/source_lock_repository.py
    domain: ADAD_Workflow
    subsystem: Core_Engine
    map_file: system_map.md
    dependencies: []
    input:
      project_root: path
      lock_dir: relative path
      source_path_for_node: callable
      allowed_symbols: '[SourceLockRepository, lock_path, read, identity, quarantine,
        restore_quarantine, release, acquire]'
      allowed_files: '[adad_source/agents/skills/adad-workflow/scripts/source_lock_repository.py,
        tests/test_source_lock_repository.py]'
    output:
      lock_path: relative path
      lock_payload: object|null
      artifact_identity: object
      mutation_result: object
      restore_result: object
    exceptions: []
    invariants: []
    preferred_pattern: repository
    verification:
    - command:
        argv:
        - '{project_python}'
        - -m
        - pytest
        - tests/test_source_lock_repository.py
        - tests/test_adad_task.py
        - tests/test_generate_task.py
        - -q
        - --basetemp
        - '{workspace}/pytest-source-lock-repository-workspace'
        cwd: project
        expect_exit: 0
    decisions:
    - '採 composition 與 dependency injection，不使用 mixin或繼承；A1 新 repository 與 core 暫時並存但以
      direct parity tests 阻止政策漂移；production ADADCore 本 Task 不修改；不建立空骨架，直接以既有 #78 characterization
      baseline驗證完整 repository行為；exact parity不包含已證實違反#78 fail-closed與ownership保護的舊行為；本R1只補正兩個fingerprints，不得順便改寫其他policy；CP-3
      將既有 internal non-overwrite restore 原樣提升為 restore_quarantine 公開邊界，讓 A3 不得直接 filesystem
      mutation'
    todo:
    - '[ ] #80-A1：原樣抽離 Source Lock artifact repository'
    - '[ ] #80-A1-R1：修正 read I/O uncertainty 與 force-reissue ownership race'
    - '[ ] #80-A1-R2：以 descriptor-derived identity 保護 exclusive-create partial cleanup'
    - '[ ] #80-A1-R2-OVERRIDE：quarantine作terminal cleanup，消除validate-to-remove最後競態'
    - '[ ] #80-A1-CP3：identity invalid evidence 補齊 raw_hex，供 A2 audit direct parity'
    - '[ ] #80-A1-CP3：公開 exact quarantine restore，供 A3 以 repository 邊界安全復原'
    checkpoint:
    - '[x] CP-1-080-A1-SOURCE-LOCK-REPOSITORY (validated：2026-07-16 人工核准)'
    - '[x] CP-1-080-A1-SOURCE-LOCK-REPOSITORY-R1 (validated：2026-07-17 人工核准；Verifier
      return_count 1/3)'
    - '[x] CP-1-080-A1-SOURCE-LOCK-REPOSITORY-R2 (validated：2026-07-17 人工核准；Verifier
      return_count 2/3)'
    - '[x] CP-HUMAN-080-A1-R2-CLEANUP-RACE-OVERRIDE (authorized：2026-07-17；return_count
      3/3 後人工指示修改)'
    - '[x] CP-3-080-A1-IDENTITY-RAW-HEX-PARITY (validated：2026-07-17 人工核准；invalid
      decode／JSON evidence 回傳 raw_hex)'
    - '[x] CP-3-080-A1-QUARANTINE-EXACT-RESTORE (validated：2026-07-17 人工核准；公開既有 non-overwrite
      exact restore)'
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 以 project_root、lock_dir 與 source_path_for_node callback 建構 repository，不 import
      adad_core，避免循環相依。
    - lock_path 沿用現有 source_path digest 與 `.lock.json` 命名，輸入正規化與輸出相對路徑不得改變。
    - read 禁止先以 exists 判斷；僅 FileNotFoundError 回傳 missing，PermissionError／其他 OSError
      必須回傳含 invalid、uncertain 與 error evidence 的非空結果並 fail-closed。
    - identity 使用 lstat 與 payload digest，保存跨平台的 dev、ino、size、mtime_ns；非 regular file、權限與
      I/O 不確定性維持 fail-closed。
    - strict UTF-8 decode 或 JSON parse 失敗時，identity 必須保留 invalid artifact 的 path、identity、payload_digest、error、uncertain
      與 raw_hex evidence，使 audit service 可與已核准 core 的 record evidence direct parity；不得重讀或變更
      artifact。
    - acquire 首次建立使用 exclusive create；同 node force-reissue 先取得 exact payload digest
      與 filesystem identity，再寫入並 fsync same-directory temp。
    - force-reissue 必須以 identity-checked quarantine 固定舊 artifact；quarantine 前 identity
      漂移立即失敗，禁止無條件 os.replace。
    - quarantine 後以 exclusive create 建立新 canonical lock；若競爭者先建立，不得覆寫，須嘗試安全還原舊鎖，restore
      conflict則保留 quarantine與 structured evidence。
    - partial write cleanup只能移除本次建立且 identity仍相同的檔案；任何 identity、permission、restore或cleanup
      uncertainty一律 fail-closed。
    - exclusive create 成功後必須在任何 write 前立即 fstat(fd)，保存至少 st_dev、st_ino 與 regular-file
      判定，作為唯一可信的 owned_fd_identity；不得以後續 path identity 取代。
    - descriptor 必須保持開啟至 write、flush、fsync 與 final fstat 完成；initial fstat 失敗時只關閉 descriptor，禁止刪除、rename或
      quarantine canonical path。
    - write／flush／fsync 失敗後，先比較 canonical path identity 與 owned_fd_identity；missing只記
      already_absent，不確定或 identity mismatch一律零 mutation並回 manual-action evidence。
    - 只有 canonical dev／ino仍等於 owned_fd_identity 時，才可進入 identity-checked quarantine；quarantine
      rename成功即為本次cleanup交易終點，operation內禁止再以path-based remove刪除quarantine。
    - release、force-reissue舊鎖cleanup與partial-create cleanup均保留quarantine作deferred
      evidence；structured cleanup固定回報quarantine_retained、canonical_cleared、artifact_deleted=false、delete_attempted=false與quarantine_path。
    - retained quarantine不得被一般canonical `*.lock.json`掃描誤認，且不得阻擋同Source後續acquire；永久清理須另立具平台能力或全域互斥契約的maintenance
      Task。
    - create成功路徑在宣稱 acquired前，必須 strict-read canonical並驗證 dev／ino、payload digest與parsed
      payload均等於本次資料；若被替換則失敗且不得碰觸 replacement。
    - release 只處理 exact source_path、node_name、task_id identity；missing、mismatch、invalid
      與 permission failure 使用既有 structured action/error 語意。
    - quarantine 只允許 same-directory unique rename；cleanup 前再次核對 identity，禁止刪除不同 identity
      或新建立的 canonical lock。
    - restore_quarantine 只接受 quarantine 成功 receipt；重新驗證 receipt 的 canonical／quarantine
      路徑皆位於 lock_dir、quarantine artifact 的 lstat identity 與 payload digest 仍精確相符，且
      canonical 明確 missing。只有全部成立時才以 non-overwrite link 還原 exact artifact；quarantine
      永久保留。
    - restore_quarantine 遇 canonical occupied、任何 strict-read／identity／path／permission
      uncertainty 或 link 失敗時零後續 mutation，回傳 structured evidence 與 manual-action 狀態；不得呼叫
      acquire、remove、unlink、replace 或 rename。
    - '除已證實違反 #78 安全契約的 exists fail-open 與 check-then-replace 競態外，其餘路徑、payload、錯誤、權限、競態與
      idempotency 政策保持 parity。'
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 2
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    state: validated
    fan_in_snapshot: 4
    known_symbols:
    - SourceLockRepository.__init__
    - SourceLockRepository._terminal_cleanup_quarantine
    - SourceLockRepository.acquire
    - SourceLockRepository.identity
    - SourceLockRepository.lock_path
    - SourceLockRepository.quarantine
    - SourceLockRepository.read
    - SourceLockRepository.release
    - SourceLockRepository.restore_quarantine
