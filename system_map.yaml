    output:
      result: object
    invariants: []
    preferred_pattern: none
    verification: []
    decisions: []
    todo:
    - '[ ] 補齊架構地圖登記（本次新增，尚未走完 CP-1/CP-2 審查）'
    checkpoint:
    - '[ ] CP-1-007 (planned)'
    complexity: low
    algorithm: []
    state: planned
    fan_in_snapshot: 0
    known_symbols:
    - main
  resolve_target_file:
    type: tool
    description: Phase 1 新增模組前，查表回答「這個 Domain/Subsystem 目前該寫進哪個實體子地圖檔案」，取代 Agent 憑印象追蹤
      include 鏈猜落點。
    source: .agents/skills/adad-workflow/scripts/resolve_target_file.py
    domain: ADAD_Workflow
    subsystem: Core_Engine
    map_file: system_map.md
    dependencies:
    - adad_core
    input:
      domain: string
      subsystem: string（選填）
    output:
      target_file: string
      domain_exists: boolean
      subsystem_exists: boolean
      hint: string
    invariants: []
    preferred_pattern: none
    verification: []
    decisions: []
    todo:
    - '[ ] 補齊架構地圖登記（本次新增，尚未走完 CP-1/CP-2 審查）'
    checkpoint:
    - '[ ] CP-1-008 (planned)'
    complexity: low
    algorithm: []
    state: planned
    fan_in_snapshot: 0
    known_symbols:
    - main
  resume_analysis:
    type: tool
    description: 比對 system_map.md 與 system_map.yaml，產出模組完成度進度報告（completed / dirty
      / planned 分類統計），供人類快速掌握目前施工進度。
    source: .agents/skills/adad-workflow/scripts/resume_analysis.py
    domain: ADAD_Workflow
    subsystem: Core_Engine
    map_file: system_map.md
    dependencies:
    - adad_core
    input:
      cwd_system_map_md: file（無 CLI 參數，讀取當前目錄檔案）
    output:
      report: text（stdout 輸出）
    invariants: []
    preferred_pattern: none
    verification: []
    decisions: []
