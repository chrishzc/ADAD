  adad_core:
    type: library
    description: '#61 Verification 子程序隔離；移除外層 Git hook/worktree 的 repo-scoped 環境，避免巢狀測試誤用外層
      index。'
    source: adad_source/agents/skills/adad-workflow/scripts/adad_core.py
    domain: ADAD_Workflow
    subsystem: Core_Engine
    map_file: system_map.md
    dependencies: []
    input:
      verification_command: object
      inherited_environment: object
    output:
      command_result: object
      sanitized_environment: object
    exceptions: []
    invariants: []
    preferred_pattern: none
    verification:
    - command:
        argv:
        - '{project_python}'
        - -m
        - pytest
        - tests/test_verify_implementation.py
        - -q
        - --basetemp
        - '{workspace}/pytest'
        cwd: project
        expect_exit: 0
    decisions:
    - 隔離責任放在通用 Verification runner；只移除 repo-routing Git 變數；不得修改或清空外層 index；本 Task
      不修改 pre-commit
    todo:
    - '[ ] #61：隔離 linked-worktree hook 的 Git repo 環境'
    checkpoint:
    - '[x] CP-1-061-CORE (validated：2026-07-15 medium Task 直接核發)'
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 執行 Verification command 前複製目前環境。
    - 移除 GIT_DIR、GIT_WORK_TREE、GIT_INDEX_FILE、GIT_COMMON_DIR、GIT_OBJECT_DIRECTORY、GIT_ALTERNATE_OBJECT_DIRECTORIES、GIT_PREFIX
      與 GIT_IMPLICIT_WORK_TREE。
    - 保留 PATH、認證與非 repo-routing 環境，並將清理後環境傳入 subprocess。
    - 測試模擬 linked worktree hook 的外層 index，驗證子程序依 cwd 使用內層 repo，且外層 index 不變。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 2
    required_context: []
    forbidden_context: []
    context_priority: {}
    state: validated
    fan_in_snapshot: 12
