  pytest_regression_lifecycle:
    type: service
    description: '#81 建立 pytest 回歸資產生命週期：`regression_backlog` 是永久保留的最小回歸集；暫時測試只在顯式
      temporary 標記、受限路徑與成功 session 後清理。'
    source: tests/conftest.py::pytest_configure,pytest_collection_modifyitems,pytest_runtest_makereport,pytest_sessionfinish,temporary_artifact_root,_is_own_temporary_root,_is_regression_backlog_marker,_is_temporary_marker,_is_temporary_path_allowed,_item_path,_path_safe_for_temporary,_temporary_lifecycle_state,_temporary_root_identity,_temporary_test_purpose
    domain: ADAD_Workflow
    subsystem: Test_Quality
    map_file: system_map.md
    dependencies: []
    input:
      pytest_config: object
      collected_items: array
      exitstatus: integer
      allowed_symbols: '[pytest_configure, pytest_collection_modifyitems, pytest_runtest_makereport,
        pytest_sessionfinish, temporary_artifact_root]'
      allowed_files: '[tests/conftest.py, tests/test_pytest_regression_lifecycle.py,
        docs/specifications/AGENT_REGR_BACKLOG_NOTE.md, docs/specifications/05_task_backlog.md]'
    output:
      lifecycle_report: object
    exceptions: []
    invariants:
    - 'deny_calls: [shutil.rmtree, os.remove, os.unlink]'
    preferred_pattern: pytest_plugin
    verification:
    - command:
        argv:
        - '{project_python}'
        - -m
        - pytest
        - tests/test_pytest_regression_lifecycle.py
        - -q
        - --basetemp
        - '{workspace}/pytest-regression-lifecycle-workspace'
        - -p
        - no:cacheprovider
        cwd: project
        expect_exit: 0
    - command:
        argv:
        - '{project_python}'
        - -m
        - pytest
        - -m
        - regression_backlog
        - -q
        - --basetemp
        - '{workspace}/pytest-regression-backlog-workspace'
        - -p
        - no:cacheprovider
        cwd: project
        expect_exit: 0
    decisions:
    - 重複可用的回歸測試以 regression_backlog 永久保留；暫時資產採 opt-in、exact collected list、successful-session-only；fixture
      明確區分 trusted local collision 的 None 加 preserve 與外部邊界或不確定性的 setup UsageError；任何
      cleanup 先全量驗證再開始 mutation
    todo:
    - '[ ] #81：建立 regression_backlog 與 temporary pytest 資產生命週期'
    checkpoint:
    - '[x] CP-1-081-PYTEST-REGRESSION-LIFECYCLE (validated：2026-07-17 人工核准)'
    - '[x] CP-3-081-TEMPORARY-ARTIFACT-FIXTURE (validated：2026-07-17 人工核准；新增唯一 artifact
      fixture 邊界)'
    - '[x] CP-3-081-SKIP-OUTCOME-HOOK (validated：2026-07-17 人工核准；outcome hook 僅決定
      preserve)'
    - '[x] CP-3-081-UNSAFE-ARTIFACT-ROOT-FAIL-CLOSED (validated：2026-07-17 人工核准；unsafe
      fixture 明確拒絕且 unlink 前重驗證)'
    - '[x] CP-3-081-DETERMINISTIC-TEMPORARY-ARTIFACT-FAILURE-MATRIX (validated：2026-07-17
      人工核准；固定 fixture outcome、pytest exit、state、mutation 與 cleanup matrix)'
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 在 pytest_configure 動態註冊 `temporary` marker；既有 pyproject 的 `regression_backlog`
      是既有 owner，禁止修改 pyproject。
    - regression_backlog 永久保留；同一測試若同時標記 regression_backlog 與 temporary，collection
      必須失敗，且不刪除任何檔案。
    - temporary 只接受 `tests/_temporary/**/*.py` 內具有非空 module-level `TEMPORARY_TEST_PURPOSE`
      的已收集檔案；絕對路徑、traversal、symlink/junction、tests 外檔案、缺目的宣告或 collection I/O 失敗一律為
      collection `pytest.UsageError`（exit 4），並且零檔案 mutation。
    - pytest_runtest_makereport 只記錄已收集 temporary item 的 skip 或失敗 outcome，並將 session
      標為 preserve；它不得建立、刪除或修改任何檔案。
    - 僅記住本 session 已收集且通過上述驗證的 exact temporary 檔案；cleanup 前必須先對全數檔案完成受限路徑、非 symlink/junction、一般
      `.py`、lstat/identity 可讀的 batch preflight，全部通過後才能開始任一 Path.unlink。任一 preflight
      失敗（含消失、I/O 不確定或型態替換）一律 preserve 且零 source unlink；pytest 保留既有 exit。
    - lifecycle state 固定記錄 `temporary_files`、`preserve`、`run_root`、`run_root_identity`、`run_root_created`、`run_root_verified`
      與 `fixture_status`；僅 `fixture_status=ready` 可保存可寫入的 verified run_root 與 identity。
    - '`temporary_artifact_root` fixture 是唯一可建立暫時 artifact 的入口；它以 session UUID 建立
      `.pytest-temporary/<run-id>`。已驗證 regular、non-link、in-boundary parent 內的 exact
      pre-existing root 是 trusted local collision：回傳 None、preserve、`fixture_status=collision`、零
      mutation，pytest 保留測試自身 exit。run-id 不合法、parent/link/junction/boundary/I/O 不安全、mkdir
      非 collision I/O、或 post-mkdir root/link/type/identity/boundary 不安全時，設定拒絕 status
      後 raise fixture setup `pytest.UsageError`（exit 1），不得回傳任何可寫入或未驗證路徑，且零 cleanup。'
    - sessionfinish 只可在 exitstatus=0、未 preserve、batch source preflight 完整通過、及 `fixture_status=ready`
      時，對本次建立且已驗證的 own run root 呼叫空目錄 Path.rmdir；nonempty root、identity 不符、rmdir error
      或任何不確定時保留 root 與內容，不得遞迴刪除。禁止掃描或刪除既有 `.pytest-*`、build、.venv、__pycache__ 或使用者路徑。
    - 禁止 shutil.rmtree、os.remove、os.unlink 與遞迴 sweep；本節點不判斷既有測試是否有用、不清理工作樹遺留檔案，也不修改
      CI runner。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 2
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    state: validated
    fan_in_snapshot: 0
