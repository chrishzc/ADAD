    - '[ ] 補齊架構地圖登記（本次新增，尚未走完 CP-1/CP-2 審查）'
    checkpoint:
    - '[ ] CP-1-009 (planned)'
    complexity: low
    algorithm: []
    state: planned
    fan_in_snapshot: 0
    known_symbols:
    - main
  validate_schema:
    type: tool
    description: 獨立於 parse_markdown/compile_map.py 之外的第二層防線，用標準 JSON Schema（system_map.schema.json）驗證
      system_map.yaml 的結構正確性；未安裝 jsonschema 套件時退回純標準庫的最小驗證器。
    source: .agents/skills/adad-workflow/scripts/validate_schema.py
    domain: ADAD_Workflow
    subsystem: Core_Engine
    map_file: system_map.md
    dependencies: []
    input:
      cwd_system_map_yaml: file（預設驗證 system_map.yaml 對照 system_map.schema.json）
    output:
      result: object
    invariants: []
    preferred_pattern: none
    verification: []
    decisions: []
    todo:
    - '[ ] 補齊架構地圖登記（本次新增，尚未走完 CP-1/CP-2 審查）'
    checkpoint:
    - '[ ] CP-1-010 (planned)'
    complexity: low
    algorithm: []
    state: planned
    fan_in_snapshot: 0
