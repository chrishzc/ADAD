    exceptions: []
    invariants: []
    preferred_pattern: schema_contract
    verification:
    - command:
        argv:
        - '{project_python}'
        - -m
        - pytest
        - tests/test_generate_task.py
        - tests/test_validate_schema.py
        - -q
        cwd: project
        expect_exit: 0
    decisions:
    - v2 與 v3 並存；summary 不得取代原始欄位；canonical template 是唯一可編輯來源；生成副本只能由 sync_assets
      更新
    todo:
    - '[ ] #54-A：完成 v3 schema；後續獨立 Task 再切換 generator'
    checkpoint:
    - '[x] CP-1-054-A (validated：2026-07-14 人工核准核發)'
    observability:
      mode: not_required
      signals: []
    complexity: low
    algorithm:
    - 保留既有 Task Schema v2 驗證能力。
    - 新增 v3 分支並要求原始 decisions 與 preferred_pattern，不得只保存 summary。
    - v3 同時保存施工約束、執行契約、context 契約與 Task 語意欄位。
    - 缺少 v3 必填欄位時必須拒絕；空陣列仍視為明確值。
    - 本 Task 不修改 read_context、generate_task 或既有 v2 核發行為。
