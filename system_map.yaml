version: 18
modules:
  sync_adad_assets:
    type: tool
    description: 以 adad_source 作為唯一可編輯來源，同步產生本 repo 的 .agents 與套件 resources 資產；Python
      快取不是受管理資產，必須排除於同步、比較與複製之外。
    source: adad_cli/sync_assets.py
    domain: ADAD_Workflow
    subsystem: Core_Engine
    map_file: system_map.md
    dependencies: []
    input:
      source_file: adad_cli/sync_assets.py
      test_file: tests/test_sync_assets.py
      target_root: Path (optional; default repository root)
      allowed_symbols: '[_tree_files, _compare_tree, _copy_tree, managed_assets, sync_assets]'
      allowed_files: '[adad_cli/sync_assets.py, tests/test_sync_assets.py]'
      forbidden_files: '[adad_source, adad_cli/resources, .agents/AGENTS.md, README.md]'
    output:
      result: object（同步或檢查結果；不一致時列出相對路徑）
    exceptions: []
    invariants:
    - 'deny_imports: [yaml]'
    preferred_pattern: pure_function
    verification:
    - must_have_assertions
    - command:
        argv:
        - '{project_python}'
        - -m
        - pytest
        - -q
        - tests/test_sync_assets.py
        - --basetemp
        - '{workspace}/pytest'
        cwd: project
        expect_exit: 0
    decisions: []
    todo:
    - '[x] 規格總覽 #50：排除並清理 Python 快取，避免同步一致性假失敗'
    - '[ ] #76-B1：同步、比較與複製時排除 Python 編譯快取'
    checkpoint:
    - '[x] CP-1-018 (validated)'
    - '[x] CP-3-002 (validated：生成資產快取排除)'
    - '[x] CP-1-076-B1-SYNC-CACHE (validated：2026-07-16 人工核准)'
    observability:
      mode: not_required
      signals: []
    complexity: low
    algorithm:
    - 收集與比較檔案樹時，排除路徑任一層為 __pycache__ 的檔案及副檔名為 .pyc 的檔案。
    - --write 前先從受管理輸出樹移除上述快取，再只複製 canonical 的非快取檔案。
    - --check 只比較受管理檔案，Python 執行期產生的快取不得造成不一致。
    - 擴充測試，驗證 canonical 與輸出任一側出現 .pyc 時，資產檢查仍只評估受管理檔案且 --write 可清理輸出快取。
    - pytest 的寫入驗證必須提供 tmp_path target_root；正式 repo 僅以 --check 驗證，避免權限與跨專案副作用。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    state: validated
    fan_in_snapshot: 2
    known_symbols:
    - _compare_file
    - _compare_tree
    - _copy_file
    - _copy_tree
    - _tree_files
    - main
    - managed_assets
    - sync_assets
  read_context:
    type: tool
    description: 讀取單一節點最小上下文的輔助工具
    source: adad_source/agents/skills/adad-workflow/scripts/read_context.py
    domain: ADAD_Workflow
    subsystem: Core_Engine
    map_file: system_map.md
    dependencies: []
    input:
      node_name: string
    output:
      context: object
    exceptions: []
    invariants: []
    preferred_pattern: none
    verification: []
    decisions: []
    todo:
    - '[ ] 補齊與其他 UI 工具串接的 context 回傳欄位'
    checkpoint:
    - '[x] CP-1-001 (validated)'
    - '[x] CP-2-001 (deployed)'
    observability:
      mode: not_required
      signals: []
    complexity: low
    algorithm: []
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    state: planned
    fan_in_snapshot: 1
    known_symbols:
    - main
  check_normalization:
    type: tool
    description: 執行 Rule of Two 邊界檢查；架構提案只能透過 UTF-8 JSON 檔案或 stdin 傳入，禁止 positional
      JSON，避免 Windows PowerShell 與其他 shell quoting 破壞內容。
    source: adad_source/agents/skills/adad-workflow/scripts/check_normalization.py::main
    domain: ADAD_Workflow
    subsystem: Core_Engine
    map_file: system_map.md
    dependencies: []
    input:
      target_file: adad_source/agents/skills/adad-workflow/scripts/check_normalization.py
      allowed_symbols: '[main]'
      forbidden_files: '[system_map.md, adad_cli/core.py, adad_cli/sync_assets.py,
        adad_cli/resources, .agents, README.md]'
      proposal_file: path（CLI 旗標為 --file；strict UTF-8 JSON 檔案，可選，與 stdin 二擇一）
      stdin: string（未提供 --file 時使用）
    output:
      result: object
    exceptions: []
    invariants:
    - 'deny_imports: [pymysql]'
    preferred_pattern: pure_function
    verification:
    - must_have_assertions
    decisions: []
    todo:
    - '[ ] 支持更加複雜的模糊關鍵字權重分析比對'
    checkpoint:
    - '[x] CP-1-002 (validated)'
    - '[x] CP-2-002 (deployed)'
    - '[x] CP-3-001 (validated：改善 Windows quoting 輸入邊界)'
    - '[x] CP-3-040 (approved：停用 positional JSON，改以 --file 或 stdin 作為唯一正式輸入)'
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 使用 argparse 定義 `--file <path>`；任何 positional 參數都視為已停用的危險輸入方式，輸出結構化錯誤並 exit 1。
    - 若提供 `--file`，以 strict UTF-8 讀取完整內容；否則從 stdin 讀取。stdin 為互動終端或內容空白時輸出結構化用法錯誤。
    - 將取得的文字交給 json.loads；解析失敗、檔案讀取失敗或根節點不是 object 時，都輸出單一 JSON error object 並 exit
      1，不輸出 traceback。
    - 保留 name 必填與既有 ADADCore.evaluate_normalization 呼叫，不改 Rule of Two 判斷邏輯及成功輸出格式。
    - canonical SKILL 指令範例不得再出現 positional JSON，只能示範 `--file`；stdin 適用於能安全傳遞原始位元流的平台。
    - 僅修改 canonical source 與同一節點的 canonical 操作指示；生成副本由 sync_adad_assets 更新，不直接手改。
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    state: validated
    fan_in_snapshot: 0
  analyze_cascade:
    type: tool
    description: 執行髒點級聯依賴分析的 DAG 走查工具
    source: adad_source/agents/skills/adad-workflow/scripts/analyze_cascade.py
    domain: ADAD_Workflow
    subsystem: Core_Engine
    map_file: system_map.md
    dependencies: []
    input:
      changed_node_name: string
    output:
      dirty_nodes: array
    exceptions: []
    invariants: []
    preferred_pattern: none
    verification: []
    decisions: []
    todo:
    - '[ ] 優化多重循環依賴的死循環防範機制'
    checkpoint:
    - '[x] CP-1-003 (validated)'
    - '[x] CP-2-003 (deployed)'
    observability:
      mode: not_required
      signals: []
    complexity: low
    algorithm: []
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    state: planned
    fan_in_snapshot: 0
    known_symbols:
    - main
  transit_state:
    type: tool
    description: 推進或變更模組生命週期狀態的狀態機工具
    source: adad_source/agents/skills/adad-workflow/scripts/transit_state.py
    domain: ADAD_Workflow
    subsystem: Core_Engine
    map_file: system_map.md
    dependencies: []
    input:
      node_name: string
      next_state: string
    output:
      result: object
    exceptions: []
    invariants: []
    preferred_pattern: none
    verification: []
    decisions: []
    todo:
    - '[ ] 結合 Git Hook 自動觸發狀態轉移'
    checkpoint:
    - '[x] CP-1-004 (validated)'
    - '[x] CP-2-004 (deployed)'
    observability:
      mode: not_required
      signals: []
    complexity: low
    algorithm: []
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    state: planned
    fan_in_snapshot: 0
    known_symbols:
    - main
  adad_core:
    type: library
    description: '#61 Verification 環境隔離；#66 context warning；#69 提供 YAML sub_maps 合成讀取、owner
      追蹤與分圖安全儲存；#74 修正函式級 Source gate 與 Windows pytest 暫存目錄；#77 Verification runner
      對 pytest command 停用 cacheprovider，避免在 project cwd 建立或修改 `.pytest_cache`；#78
      修正 Source Lock 的 task_block 一致性，並提供唯讀 audit 與明確 opt-in、fail-closed 的 prune/reconcile；#80-A4
      恢復已核准的 Source Lock compatibility facade，僅委派已抽離 repository 與唯讀 audit service。'
    source: adad_source/agents/skills/adad-workflow/scripts/adad_core.py
    domain: ADAD_Workflow
    subsystem: Core_Engine
    map_file: system_map.md
    dependencies:
    - source_lock_repository
    - source_lock_audit_service
    input:
      verification_command: object
      inherited_environment: object
      node_name: string
      node_source: string
      file_path: string|null
      source_lock_mode: audit|prune|reconcile
      task_snapshots: .agents/tasks/*.task.json
      source_lock_files: .agents/tasks/.source_locks/*.lock.json
      project_root: path
      allowed_symbols: '[ADADCore._task_path, ADADCore._save_task, ADADCore.generate_task,
        ADADCore._write_checkpoint_audit]'
      allowed_files: '[adad_source/agents/skills/adad-workflow/scripts/adad_core.py,
        tests/test_generate_task.py, tests/test_task_contract_schema.py]'
    output:
      command_result: object
      sanitized_environment: object
      context: object
      context_warnings: array
      composite_modules: object
      module_owners: object
      parsed_sub_map: string
      resolved_file_path: string
      task_block_result: object
      source_lock_report: object
      approval_failure: object（success=false、error、transaction_recovery）
    exceptions: []
    invariants: []
    preferred_pattern: none
    verification:
    - command:
        argv:
        - '{project_python}'
        - -m
        - pytest
        - tests/test_generate_task.py
        - -q
        - --basetemp
        - '{workspace}/pytest-generate-task-json-workspace'
        cwd: project
        expect_exit: 0
    decisions:
    - 隔離責任放在通用 Verification runner；缺少參考文件是規劃端 warning；sub_maps 讀取與儲存必須成對實作；禁止只合併讀取後整份
      dump root；owner 不明時禁止猜測；所有 gate 共用同一個實體 Source 路徑；pytest 暫存隔離由 Verification
      runner 提供且尊重明確 basetemp；cacheprovider 與 basetemp 是互補隔離，不讀寫 pytest config 或環境設定；canonical
      adad_source 是唯一可編輯來源；Source Lock lifecycle 同屬既有整檔 owner adad_core，不建立同檔重複 owner；_commit_checkpoint_decision
      是 approve lock release 的必要交易邊界；task_approve 必須納入 allowed symbols 才能公開結構化 recovery；typed
      structured exception 是維持成功介面的最小變更；primary failure 與 rollback failure 分欄保存；recovery
      schema 固定且可直接 JSON serialize；quarantine rename 取代 check-then-remove；全域 enumeration/read
      uncertainty 阻斷所有 mutation；blocked/approved Task 保留 source_lock 作審計 metadata，釋放只代表
      canonical physical lock 消失；mismatch 與 invalid 永遠 fail-closed；audit 不接 compile、resume、pre-commit；Task
      JSON 不納入清理；#80-A4 facade 只委派已核准 service，不重建或改寫 Source Lock 政策
    todo:
    - '[ ] #61：隔離 linked-worktree hook 的 Git repo 環境'
    - '[ ] #66：參考文件缺失改為結構化 warning，不污染 Task context'
    - '[ ] #69：YAML sub_maps 合成載入與 owner-aware save'
    - '[ ] #74：函式級 Source gate 使用實體檔案路徑，pytest command 預設使用 workspace basetemp'
    - '[ ] #77：pytest Verification 停用 cacheprovider，避免 project cwd 產生 `.pytest_cache`'
    - '[ ] #78：Source Lock task_block 一致性、唯讀 audit 與 opt-in prune/reconcile'
    - '[ ] #78-R1：approve release 交易回滾、權限不確定性與 quarantine TOCTOU 修正'
    - '[ ] #78-R2：approval transaction recovery 固定結構化輸出與剩餘 fail-closed 驗收'
    - '[ ] #78-R2-OVERRIDE：全 candidate 唯讀 preflight；任一 uncertainty 阻斷整批 mutation'
    - '[ ] #80-CP3：decode／JSON audit uncertainty 全域阻擋 mutation，建立 A2 新 direct-parity
      baseline'
    - '[ ] #80-A4：恢復 Source Lock repository／audit compatibility facade，不重寫政策'
    - '[ ] #80-A4-CP3：_release_source_lock 委派 repository 並保留 structured receipt'
    - '[ ] #77-R1：修復 pytest cacheprovider 注入與 verification runner timeout'
    - '[ ] #77-R1-CP3：將 verification workspace 移出 .agents/workspaces，隔離 pytest basetemp
      cleanup'
    - '[ ] #77-R2：區分 project command 與 disposable integration workspace 的 lifecycle'
    - '[ ] #77-R2-CP3：timeout 時終止 verification command 的完整 process group，避免子行程持有 pipe
      造成 runner 無界等待'
    - '[ ] #80：Task snapshot 生成前驗證 JSON 可解析，保護既有有效 Task'
    - '[ ] #80-R1：補齊 serialize／parse failure 的既有 Task preservation 回歸證據'
    checkpoint:
    - '[x] CP-1-074-FUNCTION-SOURCE-WINDOWS-PYTEST (validated：2026-07-16 人工核准先核發任務)'
    - '[x] CP-1-061-CORE (validated：2026-07-15 medium Task 直接核發)'
    - '[x] CP-1-066-CONTEXT (validated：2026-07-15 人工核准核發)'
    - '[x] CP-1-069-SUBMAP-CORE (validated：2026-07-15 人工要求解決)'
    - '[x] CP-1-077-PYTEST-CACHEPROVIDER (validated：2026-07-16 人工核准)'
    - '[x] CP-1-078-CORE-SOURCE-LOCK-RECONCILIATION (validated：2026-07-16 人工核准)'
    - '[x] CP-1-078-CORE-SOURCE-LOCK-RECONCILIATION-R1 (validated：2026-07-16 人工核准；Reviewer
      return_count 1/3)'
    - '[x] CP-1-078-CORE-SOURCE-LOCK-RECONCILIATION-R2 (validated：2026-07-16 人工核准；Reviewer
      return_count 2/3)'
    - '[x] CP-HUMAN-078-R2-OVERRIDE (authorized：2026-07-16；Reviewer return_count 3/3
      後人工指示修改)'
    - '[x] CP-3-080-A2-DECODE-JSON-GLOBAL-FAIL-CLOSED (validated：2026-07-17 人工核准；strict-read／decode／JSON
      parse 失敗全域 fail-closed)'
    - '[x] CP-1-080-A4-CORE-COMPATIBILITY-FACADE (validated：2026-07-17 人工核准；僅委派 repository／audit
      service，不重寫 lock 政策、不接 CLI)'
    - '[x] CP-3-080-A4-CORE-COMPATIBILITY-RELEASE-DELEGATION (validated：2026-07-17
      人工核准；_release_source_lock 僅委派 repository.release 並原樣回傳 receipt)'
    - '[x] CP-1-077-R1-VERIFICATION-CACHEPROVIDER-RECONCILIATION (validated：2026-07-17
      人工核准；僅修正 pytest argv 注入與回歸測試)'
    - '[x] CP-3-077-R1-VERIFICATION-WORKSPACE-CLEANUP-BOUNDARY (validated：2026-07-17
      人工核准；workspace 與 .agents task／lock artifact 邊界分離)'
    - '[x] CP-1-077-R2-VERIFICATION-WORKSPACE-LIFECYCLE (validated：2026-07-17 人工核准；單一
      project command 不建立 disposable workspace，integration 保留可稽核 lifecycle)'
    - '[x] CP-3-077-R2-VERIFICATION-PROCESS-GROUP-TERMINATION (validated：2026-07-18
      人工核准；timeout 終止完整 command tree 並有界收集診斷輸出)'
    - '[x] CP-1-080-ADAD-CORE-TASK-SNAPSHOT-JSON-ATOMICITY (validated：2026-07-18 人工核准；暫停
      adad_core@v17@ed2fbd，僅核發 snapshot JSON 原子性修復)'
    - '[ ] CP-1-080-ADAD-CORE-TASK-SNAPSHOT-JSON-ATOMICITY-R1 (planned：補 JSON serialization／parse
      failure direct regression)'
    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 執行 Verification command 前複製目前環境。
    - 移除 GIT_DIR、GIT_WORK_TREE、GIT_INDEX_FILE、GIT_COMMON_DIR、GIT_OBJECT_DIRECTORY、GIT_ALTERNATE_OBJECT_DIRECTORIES、GIT_PREFIX
      與 GIT_IMPLICIT_WORK_TREE。
    - 保留 PATH、認證與非 repo-routing 環境，並將清理後環境傳入 subprocess。
    - 測試模擬 linked worktree hook 的外層 index，驗證子程序依 cwd 使用內層 repo，且外層 index 不變。
    - read_context 只在 ADR／Pattern 成功載入時輸出 summary；缺檔不得寫入 target_node，改在 context_warnings
      追加固定 entry。
    - '每個 warning entry 固定為 {kind: missing_reference, reference_type: decision|pattern,
      reference_id: string, error: string}；每個載入失敗各一筆。'
    - 載入 root YAML 的 sub_maps mapping；每個值只能是 project root 內的相對 YAML 路徑，遞迴解析並阻斷 missing、cycle、path
      traversal。
    - 合併 root 與 child modules 給讀取端，模組名稱必須全域唯一；同時記錄每個 module 的 owner shard 與原始 shard
      document。
    - save 依 owner 把模組寫回原 shard；root metadata/sub_maps 只留在 root。存在 sub_maps 時，沒有 owner
      的新模組一律 fail-fast。
    - IR validity 同時比較 root Markdown、root YAML 與所有 child YAML 的 mtime；任何 child 變更都不得被忽略。
    - parse_markdown 辨識模組欄位 `Sub Map`，去除前後空白後以 `sub_map` 輸出；空值立即拒絕，scope 是否存在交由 compile_map
      驗證。
    - 載入既有 YAML 時，若 module 宣告 sub_map，必須等於實際 shard owner（root 或對應 scope）；ghost scope
      或 owner 不一致立即拒絕。未宣告 sub_map 的舊 IR 保持相容。
    - check_invariants、verify_implementation 與 implementation hash 對 Source 進行檔案操作前，必須先將
      `file.py::function` 拆成實體檔案路徑；明確傳入的 file_path 優先，但仍套用相同正規化。
    - task_submit 必須將同一個已解析實體檔案路徑傳給 invariant、verification 與 implementation hash，禁止任一階段重新退回含
      `::function` 的 Source。
    - Verification command 若為 pytest 且未提供 `--basetemp` 或 `--basetemp=...`，自動注入位於 `{workspace}`
      下且依步驟隔離的 basetemp；既有明確設定不得覆寫。
    - 展開 argv 後，以 pytest command 判斷與 token-aware helper 辨識顯式 `-p no:cacheprovider`、`-p=no:cacheprovider`
      或 compact 等價形式。
    - pytest command 缺少停用設定時，只注入一組 `-p no:cacheprovider`；既有設定不得重複，非 pytest command
      的 argv 完全不變。
    - command result 的 argv 必須保存實際執行參數；測試同時驗證 project root 不產生或修改 `.pytest_cache`。
    - '#77-R1 使用 token-aware helper 辨識分離、等號與 compact 的 cacheprovider-disabled 形式；僅在
      pytest command 缺少等價 token 時，於執行前注入單一 `-p`、`no:cacheprovider`，且回報實際 argv。'
    - '#77-R1-CP3 integration verification 的 disposable workspace 必須建立於 project root，不得位於
      `.agents/workspaces`；使 pytest 的明確或注入 `--basetemp` 與 Task／Source Lock artifact
      workspace 分離，並保留 TemporaryDirectory 成功後自動清理。'
    - '#77-R2 對沒有 fixtures 的單一 command，若 cwd=project，直接以 project root 作 `{workspace}`
      placeholder，不建立 TemporaryDirectory；pytest 的明確或注入 basetemp 因此是 project-root child，不與
      disposable workspace cleanup 競爭。'
    - '#77-R2 只有 integration_case 或 cwd=workspace 的 command 建立 disposable workspace；command
      timeout 或 cleanup 不確定時保留該次 workspace 並回傳 structured preserved evidence，禁止在 error
      path 卡住或猜測遞迴刪除。'
    - task_block 保留 Task Schema v2 必填的 source_lock metadata；先保存 blocked 與 history，再以
      exact source_path/node_name/task_id 釋放實體鎖。釋放失敗時 blocked 狀態、metadata 與 physical
      lock 均保留並 fail-closed 回報。
    - _release_source_lock 回傳 structured released、already_absent、identity_mismatch、invalid
      或 error；PermissionError/OSError 不得當作 missing，canonical lock 不得直接 remove。
    - _commit_checkpoint_decision 將 approve 的 lock release 納入同一交易：保存原 Task/map，寫入
      tentative state、audit 與 history後，重新驗 exact lock identity，再以同目錄 unique quarantine
      rename 作 commit point。
    - approve 的 quarantine rename、identity revalidation 或 permission 失敗時，回滾 Task/map
      並清除本次未提交 checkpoint；rollback cleanup 失敗必須回傳 compound recovery evidence，不得宣稱
      approved。
    - quarantine rename 成功後 approval 才成立；後續 quarantine delete 失敗只回傳 warning/action
      evidence並保留 quarantine，不回滾已提交 approval，且 canonical path 不得仍持有舊鎖。
    - approval 交易失敗使用 CheckpointTransactionError 保存固定 transaction_recovery object；human-readable
      error 不得嵌入或字串化 recovery JSON。
    - transaction_recovery 固定包含 phase、primary_failure、Task/system_map/checkpoint_audit/source_lock
      rollback 狀態、safe_to_retry 與 manual_action_required；未發生項目以 not_needed、not_created
      或 null 明確表示。
    - _commit_checkpoint_decision 對 primary failure 與各項 rollback cleanup 分別記錄，rollback
      錯誤不得遮蔽根因；restore conflict 不得覆寫不同 identity 的 canonical lock。
    - task_approve 必須優先捕捉 CheckpointTransactionError，將 transaction_recovery dict 原樣放入失敗結果；一般
      RuntimeError 維持既有 success/error 相容。
    - audit 使用可區分 FileNotFound 與 PermissionError/OSError 的 scandir、lstat、open；禁止以
      exists 將不確定性當不存在。
    - task/lock directory 列舉失敗或迭代中斷時建立 synthetic invalid record，設定 healthy=false 與
      mutation_blocked=true；全域掃描不完整時 prune/reconcile 全部禁止。
    - 個別 lock/task 的 stat、regular-file 檢查若有權限或 I/O 不確定，一律分類 invalid；strict UTF-8 read、decode
      或 JSON parse 失敗同時保留 invalid record 的 identity、digest 與 evidence，並標記 uncertain=true，使整份
      audit healthy=false、mutation_blocked=true；只有父目錄完整列舉且 Task 明確 FileNotFound 才可分類
      orphan。
    - exact Task 與 lock metadata 且 status 為 assigned、in_progress、submitted 時分類 active；駁回待修正會回
      assigned，必須保留鎖。
    - exact Task 與 lock metadata 且 status 為 approved、blocked 時分類 stale；有效 lock 且對應
      Task 確定不存在時分類 orphan。
    - lock/Task 損壞、權限錯誤、required fields 缺失、檔名 digest 不符、task_id/source_path/node_name
      mismatch 或 active Task 缺鎖均分類 invalid，不得自動刪除。
    - audit record 保存 canonical path、payload digest、lstat identity（跨平台至少含 st_dev/st_ino
      與 size/mtime_ns）、分類證據與 mutation eligibility。
    - prune 只處理 audit 判定可回收的 stale/orphan；每筆 mutation 前重新 scandir/lstat/read/parse/reload
      Task、重新分類並比對原 identity/digest。
    - prune/reconcile 在任何 mutation 前，必須先對完整 candidate list 執行唯讀 revalidation preflight；任一
      candidate 回報 uncertain 或 mutation_blocked 時立即整批失敗，mutations 必須為空。
    - 只有全部 candidates 均完成無 uncertainty 的 preflight 後才可進入 mutation phase；deterministic
      drift 可標記 skipped，但不得將 I/O／權限不確定降級為單筆 skipped 後繼續其他候選。
    - mutation phase 若再次發生全域 scan uncertainty，必須恢復當前 quarantine 並停止尚未執行的所有後續 candidates，回傳
      structured partial recovery evidence。
    - prune 以 same-directory unique quarantine rename 固定 artifact identity；rename
      後再次核對 quarantine identity/digest 並重新檢查 active claim。identity 改變或 active claim
      出現時嘗試安全 restore；restore 衝突則保留 quarantine並 fail-closed，絕不刪除。
    - 只有 quarantine identity 仍一致且舊鎖仍可安全移除時才刪 quarantine；delete 權限失敗保留 quarantine與證據，重跑不得誤刪同
      canonical path 的新鎖。
    - reconcile 只以 exclusive create 修復 exact valid active Task 的 missing lock；不得覆寫衝突、不得修改
      Task JSON，且重複執行必須 idempotent。
    - reconcile 在 exclusive create 後的 write/flush 失敗，只能在確認 partial file 是本次建立且 identity
      未變時清除；cleanup 失敗必須回傳 manual-action evidence。
    - '#80-A4 僅恢復 `_source_lock_path`、`_read_source_lock`、`_source_lock_identity`
      與 `audit_source_locks` 的既有介面；這些方法必須委派 SourceLockRepository／SourceLockAuditService，保持既有輸入、輸出與
      fail-closed evidence，不在 facade 重寫 lock 政策。'
    - '#80-A4-CP3 將 `_release_source_lock` 委派 SourceLockRepository.release，原樣回傳既有
      structured receipt；不得在 core 重建 quarantine、exact identity 或 cleanup 政策。'
    - A4 不實作 prune、reconcile、quarantine lifecycle、Task lifecycle 或 CLI；尚未有對應 service
      的介面維持後續單一節點處理，禁止以暫時邏輯補猜。
    - '#77-R2-CP3 verification command 必須在可終止的獨立 process group/session 中啟動；timeout
      時先終止整個 command tree，再以有界方式收集既有 stdout/stderr，回傳既有 timeout structured result（returncode=null）。'
    - process-group termination 僅適用 timeout 路徑；正常完成時 argv、cwd、環境、輸出解碼與 exit 判定保持不變，終止或收集不確定時仍
      fail-closed，不得無界等待。
    - '#80 Task snapshot JSON atomicity：`ADADCore.generate_task` 是 snapshot 實際 owner；成功回傳前必須以標準
      JSON parser 驗證候選內容。候選無法 parse 時不得覆寫既有有效 Task，且不得回傳 success=true。'
    - '#80-R1 regression evidence 必須分別直接模擬 JSON serialization TypeError、JSON parse
      failure 與 atomic replace failure；每條失敗路徑都驗證既有 Task bytes 未變且不遺留暫存檔。'
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 2
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
