  compile_map:
    type: tool
    description: 將 system_map.md（含 include 分區地圖）編譯為機讀 IR system_map.yaml，並執行智慧狀態合併（結構未變沿用舊狀態、結構有變標記
      dirty）與 Draft Debt Ledger 偵測。
    source: .agents/skills/adad-workflow/scripts/compile_map.py
    domain: ADAD_Workflow
    subsystem: Core_Engine
    map_file: system_map.md
    dependencies:
    - adad_core
    input:
      cwd_system_map_md: file（無 CLI 參數，讀取當前目錄的 system_map.md）
