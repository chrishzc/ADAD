    observability:
      mode: not_required
      signals: []
    complexity: medium
    algorithm:
    - 將 complexity 與 model_capability 正規化為小寫，僅接受 complexity=[low, medium, high] 與
      model_capability=[low, standard, high]；非法值拋出 ValueError。
    - complexity=low 時回傳 `issue`。
    - complexity=medium 時，只有 has_algorithm、has_boundaries、has_verification 全為 true
      才回傳 `issue`，否則回傳 `complete_spec`。
    - complexity=high 時，只有 model_capability=high、override_approved=true 且 override_reason
      去除空白後非空，才回傳 `issue_override`。
    - 其餘 high 情況一律回傳 `split`；不得讀寫檔案、環境變數、全域狀態或呼叫外部服務。
    idempotency:
      level: unknown
      side_effects: []
