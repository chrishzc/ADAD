  task_snapshot_schema:
    type: schema
    description: 定義 Task Schema v3 的快照保真契約，與 v2 相容並防止 Decisions、施工約束及執行契約在核發時靜默遺失；本
      Task 僅修改 schema，不切換 generator。
    source: adad_source/templates/task_schema.json
