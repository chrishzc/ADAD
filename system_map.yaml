  render_portable_python_hook_command:
    type: function
    description: 使用專案 `.venv` 的 Python 直譯器與 hook 腳本路徑，依明確的 `windows` 或 `posix` command
      family 引用規則產生可攜式 command；不得把此輸入誤解為 `sys.platform` 的 `win32`、`linux` 或 `darwin`，並須正確處理含空白或特殊字元的專案路徑。
    source: adad_cli/platform_io.py::render_portable_python_hook_command
    domain: ADAD_Roadmap
    subsystem: Platform_Integration
    map_file: docs\domains\adad_roadmap.md
    dependencies:
    - project_venv_python
    input:
      python_executable: path
      script_path: path
      platform_family: string
    output:
      command: string
    exceptions: []
    invariants:
    - 'deny_calls: [subprocess.run, subprocess.Popen, os.system]'
    preferred_pattern: boundary_adapter
    verification:
    - case:
        input:
          python_executable: C:\Program Files\Python\python.exe
          script_path: C:\Project Space\hook.py
          platform_family: windows
        expect: '"C:\Program Files\Python\python.exe" "C:\Project Space\hook.py"'
    - case:
        input:
          python_executable: /opt/My Python/bin/python
          script_path: /work/My Project/hook.py
          platform_family: posix
        expect: '''/opt/My Python/bin/python'' ''/work/My Project/hook.py'''
    - case:
        input:
          python_executable: python
          script_path: hook.py
          platform_family: win32
        expect_exception: ValueError
    decisions: []
    todo:
    - '[ ] 移除 Claude PreToolUse hook 的 `python3` 硬編碼並支援含空白路徑'
    checkpoint:
    - '[ ] CP-1-043 (planned)'
    - '[x] CP-3-044 (validated)'
    observability:
      mode: not_required
      signals: []
    complexity: low
    algorithm:
    - 先以精確字串比對驗證 `platform_family`，不是 `windows` 或 `posix` 時立即拋出 `ValueError`。
    - '`windows` 使用符合 CreateProcess/CommandLineToArgvW 的 argv 引用規則渲染 Python 與腳本路徑。'
    - '`posix` 使用 POSIX shell 引用規則分別引用 Python 與腳本路徑，再以單一空白連接。'
    idempotency:
      level: unknown
      side_effects: []
    retry_budget: 0
    required_context: []
    forbidden_context: []
    context_priority: {}
    non_goals: []
    state: validated
    fan_in_snapshot: 1
