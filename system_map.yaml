  project_virtual_environment:
    type: lifecycle
    description: 統一 adad init、upgrade、remove 的虛擬環境生命週期；專案只管理 .venv，Git hook 永遠使用專案
      .venv 的直譯器，舊 venv 只提示而不自動搬移或刪除（#48）。
    source: adad_cli/core.py::_project_venv_python,init_project,upgrade_project,clean_project
